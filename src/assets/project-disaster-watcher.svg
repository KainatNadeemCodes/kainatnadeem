<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0800"/>
      <stop offset="100%" stop-color="#080500"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow1)"/>
  <rect width="800" height="500" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#f9731608" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Simplified world map outline (abstract) -->
  <g stroke="#f9731615" stroke-width="0.8" fill="none">
    <ellipse cx="400" cy="250" rx="340" ry="180"/>
    <ellipse cx="400" cy="250" rx="240" ry="180"/>
    <ellipse cx="400" cy="250" rx="140" ry="180"/>
    <line x1="60" y1="250" x2="740" y2="250"/>
    <line x1="400" y1="70" x2="400" y2="430"/>
  </g>

  <!-- Alert hotspot markers -->
  <!-- Hotspot 1 - large -->
  <circle cx="280" cy="200" r="18" fill="#ef444425" stroke="#ef444460" stroke-width="1.5"/>
  <circle cx="280" cy="200" r="8" fill="#ef444445" stroke="#ef4444" stroke-width="1.2"/>
  <circle cx="280" cy="200" r="3" fill="#ef4444"/>
  <circle cx="280" cy="200" r="28" fill="none" stroke="#ef444430" stroke-width="1">
    <animate attributeName="r" values="18;35;18" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Hotspot 2 - medium -->
  <circle cx="520" cy="180" r="13" fill="#f9731620" stroke="#f9731650" stroke-width="1.2"/>
  <circle cx="520" cy="180" r="6" fill="#f9731640" stroke="#f97316" stroke-width="1"/>
  <circle cx="520" cy="180" r="2.5" fill="#f97316"/>
  <circle cx="520" cy="180" r="20" fill="none" stroke="#f9731625" stroke-width="0.8">
    <animate attributeName="r" values="13;26;13" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Hotspot 3 - small -->
  <circle cx="460" cy="300" r="9" fill="#fbbf2420" stroke="#fbbf2450" stroke-width="1"/>
  <circle cx="460" cy="300" r="4" fill="#fbbf2440" stroke="#fbbf24" stroke-width="0.8"/>
  <circle cx="460" cy="300" r="2" fill="#fbbf24"/>

  <!-- Hotspot 4 -->
  <circle cx="340" cy="290" r="7" fill="#f9731620" stroke="#f9731645" stroke-width="0.8"/>
  <circle cx="340" cy="290" r="3" fill="#f97316"/>

  <!-- Alert lines to panel -->
  <line x1="280" y1="200" x2="90" y2="130" stroke="#ef444430" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="520" y1="180" x2="700" y2="120" stroke="#f9731630" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="460" y1="300" x2="680" y2="340" stroke="#fbbf2425" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Info panels -->
  <rect x="30" y="95" width="130" height="62" rx="6" fill="#0d080080" stroke="#ef444435" stroke-width="1"/>
  <text x="95" y="114" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="8" opacity="0.8">SEVERITY · HIGH</text>
  <text x="95" y="128" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">⚠ Flood Risk</text>
  <text x="95" y="143" text-anchor="middle" fill="#fca5a580" font-family="monospace" font-size="7">Alert dispatched · 0.8s</text>

  <rect x="640" y="85" width="130" height="62" rx="6" fill="#0d080080" stroke="#f9731635" stroke-width="1"/>
  <text x="705" y="104" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="8" opacity="0.8">SEVERITY · MED</text>
  <text x="705" y="118" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="11" font-weight="bold">⚡ Seismic</text>
  <text x="705" y="133" text-anchor="middle" fill="#fed7aa80" font-family="monospace" font-size="7">Monitoring · Active</text>

  <rect x="620" y="310" width="140" height="62" rx="6" fill="#0d080080" stroke="#fbbf2430" stroke-width="1"/>
  <text x="690" y="329" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="8" opacity="0.8">SEVERITY · LOW</text>
  <text x="690" y="343" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">🌪 Wind Alert</text>
  <text x="690" y="358" text-anchor="middle" fill="#fde68a80" font-family="monospace" font-size="7">Tracking · 3 regions</text>

  <!-- Bottom stats bar -->
  <rect x="160" y="390" width="480" height="50" rx="8" fill="#f9731610" stroke="#f9731630" stroke-width="1"/>
  <text x="225" y="410" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="8">Alerts Today</text>
  <text x="225" y="428" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="14" font-weight="bold">247</text>
  <line x1="310" y1="398" x2="310" y2="432" stroke="#f9731625" stroke-width="0.8"/>
  <text x="400" y="410" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="8">Regions Covered</text>
  <text x="400" y="428" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="14" font-weight="bold">58</text>
  <line x1="490" y1="398" x2="490" y2="432" stroke="#f9731625" stroke-width="0.8"/>
  <text x="575" y="410" text-anchor="middle" fill="#fed7aa" font-family="monospace" font-size="8">Avg Response</text>
  <text x="575" y="428" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="14" font-weight="bold">1.2s</text>

  <!-- Label -->
  <text x="400" y="462" text-anchor="middle" fill="#fed7aa45" font-family="monospace" font-size="11" letter-spacing="3">DISASTER WATCHER · AI MONITORING</text>
  <text x="400" y="478" text-anchor="middle" fill="#f9731635" font-family="monospace" font-size="8">Python · ML Classification · Real-time APIs · React · Geospatial</text>
</svg>
