<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0118"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow1)"/>
  <rect width="800" height="500" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#ec489915" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Central SOS ring -->
  <circle cx="400" cy="230" r="110" fill="none" stroke="#ec489930" stroke-width="1"/>
  <circle cx="400" cy="230" r="80" fill="none" stroke="#ec489950" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="50" fill="#ec489915" stroke="#ec489970" stroke-width="1.5"/>

  <!-- SOS text -->
  <text x="400" y="220" text-anchor="middle" fill="#ec4899" font-family="monospace" font-size="28" font-weight="bold" opacity="0.9">SOS</text>
  <text x="400" y="245" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="9" opacity="0.7">ALERT ACTIVE</text>

  <!-- Pulse rings -->
  <circle cx="400" cy="230" r="130" fill="none" stroke="#ec489920" stroke-width="1">
    <animate attributeName="r" values="130;160;130" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="230" r="150" fill="none" stroke="#ec489915" stroke-width="0.8">
    <animate attributeName="r" values="150;185;150" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection dots -->
  <circle cx="200" cy="150" r="5" fill="#ec489980"/>
  <line x1="200" y1="150" x2="355" y2="210" stroke="#ec489940" stroke-width="1"/>
  <circle cx="600" cy="140" r="5" fill="#ec489980"/>
  <line x1="600" y1="140" x2="445" y2="210" stroke="#ec489940" stroke-width="1"/>
  <circle cx="180" cy="340" r="5" fill="#8b5cf680"/>
  <line x1="180" y1="340" x2="355" y2="255" stroke="#8b5cf640" stroke-width="1"/>
  <circle cx="620" cy="330" r="5" fill="#8b5cf680"/>
  <line x1="620" y1="330" x2="445" y2="255" stroke="#8b5cf640" stroke-width="1"/>

  <!-- Small UI cards -->
  <rect x="80" y="120" width="100" height="52" rx="6" fill="#1a0a2e" stroke="#ec489930" stroke-width="1"/>
  <text x="130" y="140" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="8" opacity="0.8">Emergency</text>
  <text x="130" y="153" text-anchor="middle" fill="#ec4899" font-family="monospace" font-size="11" font-weight="bold">Contacts</text>
  <text x="130" y="165" text-anchor="middle" fill="#f9a8d480" font-family="monospace" font-size="7">3 nearby</text>

  <rect x="620" y="110" width="100" height="52" rx="6" fill="#1a0a2e" stroke="#8b5cf630" stroke-width="1"/>
  <text x="670" y="130" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="8" opacity="0.8">Community</text>
  <text x="670" y="143" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="11" font-weight="bold">Stories</text>
  <text x="670" y="155" text-anchor="middle" fill="#c4b5fd80" font-family="monospace" font-size="7">24 shared</text>

  <rect x="80" y="310" width="100" height="52" rx="6" fill="#1a0a2e" stroke="#8b5cf630" stroke-width="1"/>
  <text x="130" y="330" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="8" opacity="0.8">Safe Route</text>
  <text x="130" y="345" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="10" font-weight="bold">Active</text>
  <rect x="90" y="349" width="80" height="4" rx="2" fill="#8b5cf630"/>
  <rect x="90" y="349" width="52" height="4" rx="2" fill="#8b5cf6"/>

  <rect x="620" y="300" width="100" height="52" rx="6" fill="#1a0a2e" stroke="#ec489930" stroke-width="1"/>
  <text x="670" y="320" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="8" opacity="0.8">Alert Sent</text>
  <text x="670" y="336" text-anchor="middle" fill="#ec4899" font-family="monospace" font-size="10" font-weight="bold">✓ 2.3s</text>
  <text x="670" y="348" text-anchor="middle" fill="#f9a8d480" font-family="monospace" font-size="7">response time</text>

  <!-- Label -->
  <text x="400" y="440" text-anchor="middle" fill="#f9a8d460" font-family="monospace" font-size="11" letter-spacing="4">SHESPHERE · SAFETY PLATFORM</text>

  <!-- Bottom tech stack -->
  <text x="400" y="465" text-anchor="middle" fill="#ec489940" font-family="monospace" font-size="8">React · TypeScript · Real-time · Inclusive UI</text>
</svg>
